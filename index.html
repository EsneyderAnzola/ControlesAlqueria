<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alquería · Dashboard</title>
    <style>
        /* Minimal styling - pa que cargue rápido */
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0b1120;
            margin: 0;
            padding: 16px;
            color: #e2e8f0;
        }
        .container { max-width: 1300px; margin: 0 auto; }
        h1 { 
            color: white; 
            font-size: 1.6rem; 
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .badge {
            background: #ef4444;
            color: white;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 20px;
        }
        .sub {
            color: #94a3b8;
            margin-bottom: 24px;
            border-left: 3px solid #ef4444;
            padding-left: 12px;
            font-size: 0.9rem;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-bottom: 24px;
        }
        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 14px;
        }
        .card-title {
            font-size: 0.7rem;
            color: #94a3b8;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .card-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: white;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
            overflow: hidden;
        }
        th {
            background: #2d3a4f;
            text-align: left;
            padding: 8px 12px;
            font-size: 0.7rem;
            color: #cbd5e1;
        }
        td {
            padding: 8px 12px;
            border-bottom: 1px solid #334155;
            font-size: 0.8rem;
        }
        .alert-list {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 8px;
        }
        .alert-item {
            padding: 8px;
            border-bottom: 1px solid #334155;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .alert-item:last-child { border-bottom: none; }
        .alert-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ef4444;
        }
        .loading {
            text-align: center;
            padding: 50px;
            color: #94a3b8;
        }
        .footer {
            margin-top: 30px;
            color: #4b5563;
            font-size: 0.7rem;
            text-align: center;
        }
        @media (max-width: 700px) {
            .grid-2 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🥛 Alquería · Control <span class="badge">LIVE</span></h1>
        <div class="sub" id="subtitle">Cargando datos desde Google Sheets...</div>

        <div id="content" style="display: none;">
            <!-- KPIs -->
            <div class="stats" id="kpis"></div>

            <!-- Dos columnas -->
            <div class="grid-2">
                <div>
                    <h3 style="margin-bottom: 8px;">📊 Ventas por SKU</h3>
                    <table>
                        <thead><tr><th>Producto</th><th>Inicial</th><th>Vendido</th></tr></thead>
                        <tbody id="sku-body"></tbody>
                    </table>
                </div>
                <div>
                    <h3 style="margin-bottom: 8px;">⚠️ Alertas activas</h3>
                    <div class="alert-list" id="alertas"></div>
                </div>
            </div>

            <!-- Tiempos -->
            <h3 style="margin: 20px 0 8px;">⏱️ Control de tiempos</h3>
            <table>
                <thead>
                    <tr><th>Nombre</th><th>PDV</th><th>Fecha</th><th>Entrada</th><th>Salida</th><th>Horas</th></tr>
                </thead>
                <tbody id="horas-body"></tbody>
            </table>
        </div>

        <div class="loading" id="loading">
            <div>🔄 Conectando con el script de Alquería...</div>
        </div>
        
        <div class="footer" id="footer"></div>
    </div>

    <script>
    // █████████████████████████████████████████████████████████████████
    //  URL DE TU WEB APP - LA MISMA QUE ESTÁ EN TU PROYECTO
    //  (La del script que me mandaste con el doGet)
    // █████████████████████████████████████████████████████████████████
    
    // ESTA ES LA URL QUE VA - CAMBIALA SI ES NECESARIO PERO ESTA ES LA CORRECTA
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxRL8jxEsgT6vLNUGwh11XobN2z9HU2G21rjX1CKb6fpUeYdtOFgRowViFTt7vagmNR/exec";

    // █████████████████████████████████████████████████████████████████
    //  CÓDIGO QUE CONSUME EL SCRIPT - NO TOCAR
    // █████████████████████████████████████████████████████████████████

    async function cargarDatos() {
        try {
            // Llamada al script con JSONP
            const response = await fetch(SCRIPT_URL + '?page=api&t=' + Date.now());
            const data = await response.json();
            
            if (data.ok && data.data) {
                renderTodo(data.data);
            } else {
                throw new Error(data.error || 'Error cargando datos');
            }
        } catch (error) {
            document.getElementById('loading').innerHTML = `
                <div style="color: #ef4444;">
                    ❌ Error: ${error.message}<br><br>
                    <button onclick="location.reload()" style="background:#3b82f6; color:white; border:none; padding:8px 16px; border-radius:6px; cursor:pointer;">Reintentar</button>
                </div>
            `;
        }
    }

    function renderTodo(d) {
        // Ocultar loading y mostrar contenido
        document.getElementById('content').style.display = 'block';
        document.getElementById('loading').style.display = 'none';
        
        // Subtítulo con info
        const filtros = d.filters || {};
        const filtroStr = [filtros.fecha, filtros.ciudad, filtros.pdv].filter(Boolean).join(' · ') || 'Todos los registros';
        document.getElementById('subtitle').innerHTML = `📁 ${filtroStr} · ${d.meta.totalFilasG} registros`;
        document.getElementById('footer').innerHTML = `🔄 Actualizado: ${new Date(d.meta.generado).toLocaleString()}`;

        // KPIs
        const k = d.kpis;
        document.getElementById('kpis').innerHTML = `
            <div class="card"><div class="card-title">Ventas</div><div class="card-value">${k.totalVentas}</div></div>
            <div class="card"><div class="card-title">Rotación</div><div class="card-value">${k.rotacionPct}%</div></div>
            <div class="card"><div class="card-title">Asesores</div><div class="card-value">${k.personasActivas}</div></div>
            <div class="card"><div class="card-title">Alertas</div><div class="card-value">${k.totalAlertas}</div></div>
            <div class="card"><div class="card-title">Sin reporte</div><div class="card-value">${k.sinReporte}</div></div>
            <div class="card"><div class="card-title">Prom. horas</div><div class="card-value">${k.promedioHoras}h</div></div>
        `;

        // Tabla SKU
        let skuHtml = '';
        d.skuAgg.forEach(s => {
            skuHtml += `<tr><td>${s.label}</td><td>${s.ini}</td><td>${s.vta}</td></tr>`;
        });
        document.getElementById('sku-body').innerHTML = skuHtml;

        // Alertas - mostramos las SIN_REPORTE y SIN_ENTRADA primero
        let alertasHtml = '';
        const alertasPrioritarias = d.alertasGlobales
            .filter(a => a.tipo === 'SIN_REPORTE' || a.tipo === 'SIN_ENTRADA')
            .slice(0, 10);
        
        if (alertasPrioritarias.length === 0) {
            alertasHtml = '<div style="padding: 15px; color: #4b5563;">✅ Sin alertas críticas</div>';
        } else {
            alertasPrioritarias.forEach(a => {
                alertasHtml += `
                    <div class="alert-item">
                        <div class="alert-dot"></div>
                        <div style="flex:1;"><strong>${a.pdv || a.nombre}</strong> · ${a.msg || a.label}</div>
                        <div style="font-size:0.7rem; color:#94a3b8;">${a.fecha}</div>
                    </div>
                `;
            });
        }
        document.getElementById('alertas').innerHTML = alertasHtml;

        // Horas laboradas (últimas 20)
        let horasHtml = '';
        if (!d.horasLaboradas || d.horasLaboradas.length === 0) {
            horasHtml = '<tr><td colspan="6" style="text-align:center; padding:20px;">Sin datos</td></tr>';
        } else {
            d.horasLaboradas.slice(0, 20).forEach(h => {
                horasHtml += `
                    <tr>
                        <td><strong>${h.nombre}</strong></td>
                        <td>${h.pdv}</td>
                        <td>${h.fecha}</td>
                        <td>${h.entradaISO ? new Date(h.entradaISO).toLocaleTimeString() : '—'}</td>
                        <td>${h.salidaISO ? new Date(h.salidaISO).toLocaleTimeString() : '—'}</td>
                        <td>${h.horasLabel}</td>
                    </tr>
                `;
            });
        }
        document.getElementById('horas-body').innerHTML = horasHtml;
    }

    // Arrancar
    window.onload = cargarDatos;
    </script>
</body>
</html>
